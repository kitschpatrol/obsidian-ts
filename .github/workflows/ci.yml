name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  OBSIDIAN_VERSION: '1.12.7'
  OBSIDIAN_VAULT: 'test/assets/obsidian-ts-test-vault'

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Skip for now
      - name: Lint
        run: pnpm run lint

      # Install and start Obsidian on Linux using the AppImage distribution.
      # We use AppImage instead of Flatpak because Flatpak sandboxes the config
      # path (~/.var/app/md.obsidian.Obsidian/...) making it harder to pre-seed.
      # Approach based on https://github.com/lucastraba/obsidianless
      #
      # Steps:
      # 1. Install Electron runtime dependencies and Xvfb for a virtual display
      # 2. Download and extract the AppImage
      # 3. Symlink the binary onto PATH
      # 4. Write obsidian.json to register the test vault and enable the CLI
      # 5. Start Xvfb and launch Obsidian in the background (the CLI requires a
      #    running Obsidian instance to communicate with via IPC)
      # 6. Replace the symlink with a wrapper script that injects DISPLAY,
      #    --no-sandbox, and filters noisy dbus errors for all CLI callers
      - name: Setup Obsidian (Linux)
        if: runner.os == 'Linux'
        run: |
          # Install Electron runtime deps and virtual display
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11 libgtk-3-0 libnss3 libasound2t64 libgbm1 libsecret-1-0

          # Download and extract the AppImage
          wget -q "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.AppImage" -O /tmp/obsidian.AppImage
          chmod +x /tmp/obsidian.AppImage
          cd /tmp && /tmp/obsidian.AppImage --appimage-extract
          sudo mv /tmp/squashfs-root /opt/obsidian
          sudo ln -s /opt/obsidian/obsidian /usr/local/bin/obsidian

          # Write obsidian.json to register the test vault and enable the CLI.
          # Normally this is done via Settings > General, but we pre-seed it here.
          # The "cli" key was found by reverse-engineering obsidian.asar.
          mkdir -p ~/.config/obsidian
          jq -n --arg name "$(basename "${OBSIDIAN_VAULT}")" --arg path "${GITHUB_WORKSPACE}/${OBSIDIAN_VAULT}" \
            '{"vaults":{($name):{"path":$path,"ts":0,"open":true}},"cli":true}' \
            > ~/.config/obsidian/obsidian.json

          # Start a virtual display for the Electron-based CLI
          Xvfb -ac :99 -screen 0 1280x1024x16 &

          # Launch Obsidian in the background — the CLI talks to this instance via IPC.
          # --no-sandbox: extracted AppImage lacks a properly configured chrome-sandbox
          # --disable-gpu: no real GPU in CI
          DISPLAY=:99 /usr/local/bin/obsidian --no-sandbox --disable-gpu &
          sleep 5

          # Replace the symlink with a wrapper script so all downstream callers
          # (including obsidian-ts) get DISPLAY / --no-sandbox automatically and
          # don't see noisy dbus errors in their output.
          sudo mv /usr/local/bin/obsidian /usr/local/bin/obsidian-real
          # shellcheck disable=SC2016
          printf '%s\n' \
            '#!/bin/bash' \
            'DISPLAY=:99 /usr/local/bin/obsidian-real --no-sandbox "$@" 2>&1 | grep -v "ERROR:dbus/bus.cc"' \
            'exit "${PIPESTATUS[0]}"' \
            | sudo tee /usr/local/bin/obsidian > /dev/null
          sudo chmod +x /usr/local/bin/obsidian

      - name: Setup Obsidian (macOS)
        if: runner.os == 'macOS'
        run: |
          wget -q "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.dmg"
          sudo hdiutil attach "Obsidian-${OBSIDIAN_VERSION}.dmg"
          sudo cp -rf "/Volumes/Obsidian ${OBSIDIAN_VERSION}-universal/Obsidian.app" /Applications
          sudo hdiutil detach "/Volumes/Obsidian ${OBSIDIAN_VERSION}-universal"
          mkdir -p ~/Library/Application\ Support/obsidian
          jq -n --arg name "$(basename "${OBSIDIAN_VAULT}")" --arg path "${GITHUB_WORKSPACE}/${OBSIDIAN_VAULT}" \
            '{"vaults":{($name):{"path":$path,"ts":0,"open":true}},"cli":true}' \
            > ~/Library/Application\ Support/obsidian/obsidian.json

      - name: Setup Obsidian (Windows)
        if: runner.os == 'Windows'
        run: echo "Obsidian CI setup not yet supported on Windows. Skipping."

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: pnpm run test

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: pnpm run test

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: echo "Testing not yet supported on Windows. Skipping."
