name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  OBSIDIAN_VERSION: '1.12.7'
  OBSIDIAN_VAULT: 'test/assets/obsidian-ts-test-vault'

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      # Install Obsidian on Linux using the AppImage distribution.
      # We use AppImage instead of Flatpak because Flatpak sandboxes the config
      # path (~/.var/app/md.obsidian.Obsidian/...) making it harder to pre-seed.
      # Approach based on https://github.com/lucastraba/obsidianless
      #
      # Overview:
      # 1. Install Electron runtime dependencies and Xvfb for a virtual display
      # 2. Download and extract the AppImage, symlink binary onto PATH
      # 3. Write obsidian.json to register the test vault and enable the CLI
      # 4. Start Xvfb (Electron needs a display even for CLI-only usage)
      # 5. Launch Obsidian in the background (CLI commands communicate with a
      #    running instance via IPC — without it, commands hang)
      # 6. Create a wrapper script at /usr/local/bin/obsidian so all callers
      #    (including obsidian-ts) transparently get DISPLAY and --no-sandbox
      #
      # Key flags:
      # --no-sandbox: required because the extracted AppImage's chrome-sandbox
      #   binary lacks the SUID root permissions Chromium expects (would need
      #   chown root + chmod 4755, but --no-sandbox is simpler)
      # --disable-gpu: no real GPU available in CI
      #
      # The wrapper also filters noisy "ERROR:dbus/bus.cc" messages from stderr
      # and uses PIPESTATUS to preserve the real obsidian exit code (not grep's).
      - name: Setup Obsidian (Linux)
        if: runner.os == 'Linux'
        run: |
          # Install Electron runtime deps and Xvfb virtual display server
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11 libgtk-3-0 libnss3 libasound2t64 libgbm1 libsecret-1-0

          # Download the AppImage, extract it, and symlink the binary onto PATH
          wget -q "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.AppImage" -O /tmp/obsidian.AppImage
          chmod +x /tmp/obsidian.AppImage
          cd /tmp && /tmp/obsidian.AppImage --appimage-extract
          sudo mv /tmp/squashfs-root /opt/obsidian
          sudo ln -s /opt/obsidian/obsidian /usr/local/bin/obsidian

          # Pre-seed obsidian.json to register the test vault and enable the CLI.
          # The "cli" key is normally set via Settings > General > CLI toggle.
          # It was found by reverse-engineering obsidian.asar — the main process
          # checks D.cli where D is the parsed config file.
          # Config path: ~/.config/obsidian/obsidian.json (standard Linux path)
          mkdir -p ~/.config/obsidian
          jq -n --arg name "$(basename "${OBSIDIAN_VAULT}")" --arg path "${GITHUB_WORKSPACE}/${OBSIDIAN_VAULT}" \
            '{"vaults":{($name):{"path":$path,"ts":0,"open":true}},"cli":true}' \
            > ~/.config/obsidian/obsidian.json

          # Start Xvfb — Electron requires a display even for headless CLI usage
          Xvfb -ac :99 -screen 0 1280x1024x16 &

          # Launch Obsidian in the background so CLI commands have an instance to
          # talk to via IPC. Without this, CLI commands become the main instance
          # and hang waiting for a GUI interaction.
          DISPLAY=:99 /usr/local/bin/obsidian --no-sandbox --disable-gpu &
          sleep 5

          # Replace the symlink with a wrapper script so downstream callers
          # (including obsidian-ts) just call `obsidian` without worrying about
          # DISPLAY, --no-sandbox, or dbus noise.
          sudo mv /usr/local/bin/obsidian /usr/local/bin/obsidian-real
          # shellcheck disable=SC2016
          printf '%s\n' \
            '#!/bin/bash' \
            'DISPLAY=:99 /usr/local/bin/obsidian-real --no-sandbox "$@" 2>&1 | grep -v "ERROR:dbus/bus.cc"' \
            'exit "${PIPESTATUS[0]}"' \
            | sudo tee /usr/local/bin/obsidian > /dev/null
          sudo chmod +x /usr/local/bin/obsidian

      # Install Obsidian on macOS from the official .dmg.
      # Similar to Linux, the CLI communicates with a running Obsidian instance
      # via IPC, so we must launch it in the background before running tests.
      #
      # Overview:
      # 1. Download and mount the .dmg via ditto (preserves bundle metadata)
      # 2. Remove macOS quarantine so the app can launch
      # 3. Write obsidian.json to register the test vault and enable the CLI
      # 4. Launch Obsidian via `open -a` (uses Launch Services to properly
      #    resolve Electron helper apps — calling the binary directly causes
      #    "Unable to find helper app" FATAL errors)
      # 5. Create a wrapper script at /usr/local/bin/obsidian
      #
      # Config path: ~/Library/Application Support/obsidian/obsidian.json
      - name: Setup Obsidian (macOS)
        if: runner.os == 'macOS'
        run: |
          # Download and mount the .dmg, copy the app to /Applications
          curl -fsSL "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.dmg" -o /tmp/Obsidian.dmg
          sudo hdiutil attach /tmp/Obsidian.dmg -nobrowse
          sudo ditto "/Volumes/Obsidian ${OBSIDIAN_VERSION}-universal/Obsidian.app" /Applications/Obsidian.app
          sudo hdiutil detach "/Volumes/Obsidian ${OBSIDIAN_VERSION}-universal"

          # Remove quarantine so the app can launch without Gatekeeper blocking
          sudo xattr -rd com.apple.quarantine /Applications/Obsidian.app

          # Pre-seed obsidian.json (same format as Linux, different path)
          mkdir -p ~/Library/Application\ Support/obsidian
          jq -n --arg name "$(basename "${OBSIDIAN_VAULT}")" --arg path "${GITHUB_WORKSPACE}/${OBSIDIAN_VAULT}" \
            '{"vaults":{($name):{"path":$path,"ts":0,"open":true}},"cli":true}' \
            > ~/Library/Application\ Support/obsidian/obsidian.json

          # Launch Obsidian via macOS `open` so Launch Services properly
          # resolves helper apps (renderer, GPU, plugin). CLI commands talk to
          # this instance via IPC — without a running instance, CLI commands
          # try to become the main instance, print Electron startup noise, and
          # may hang or crash.
          open -a /Applications/Obsidian.app
          sleep 10

          # Verify Obsidian is actually running — if it crashed on launch,
          # all CLI commands will fail.
          if ! pgrep -f "Obsidian" > /dev/null; then
            echo "::error::Obsidian failed to start — no process found"
            exit 1
          fi
          echo "Obsidian is running (PID: $(pgrep -f 'Obsidian.app' | head -1))"

          # Create a wrapper script so `obsidian` resolves on PATH.
          # stdout is clean; just suppress stderr to avoid Chromium diagnostics.
          # shellcheck disable=SC2016
          printf '%s\n' \
            '#!/bin/bash' \
            '/Applications/Obsidian.app/Contents/MacOS/Obsidian "$@" 2>/dev/null' \
            | sudo tee /usr/local/bin/obsidian > /dev/null
          sudo chmod +x /usr/local/bin/obsidian

      # Install Obsidian on Windows from the official .exe installer.
      # Same IPC pattern as Linux/macOS: pre-seed config, launch a background
      # instance, then CLI commands talk to it via IPC.
      #
      # Overview:
      # 1. Download and silently install the .exe (/S flag for NSIS)
      # 2. Write obsidian.json to register the test vault and enable the CLI
      # 3. Add the install directory to PATH so `obsidian` resolves
      # 4. Launch Obsidian in the background for IPC
      # 5. Create a wrapper batch file to suppress stderr noise
      #
      # Config path: %APPDATA%\obsidian\obsidian.json
      - name: Setup Obsidian (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download the installer
          Invoke-WebRequest -Uri "https://github.com/obsidianmd/obsidian-releases/releases/download/v$env:OBSIDIAN_VERSION/Obsidian-$env:OBSIDIAN_VERSION.exe" -OutFile "$env:TEMP\Obsidian-Setup.exe"

          # Run silent install (NSIS /S flag)
          Start-Process -FilePath "$env:TEMP\Obsidian-Setup.exe" -ArgumentList "/S" -Wait
          Start-Sleep -Seconds 5

          # Find the installed binary — check common locations
          $searchPaths = @(
            "$env:LOCALAPPDATA\Obsidian",
            "$env:LOCALAPPDATA\Programs\Obsidian",
            "$env:LOCALAPPDATA\obsidian",
            "$env:ProgramFiles\Obsidian",
            "${env:ProgramFiles(x86)}\Obsidian",
            "$env:USERPROFILE\AppData\Local\Obsidian"
          )
          $obsidianExe = $null
          foreach ($dir in $searchPaths) {
            $candidate = Join-Path $dir "Obsidian.exe"
            if (Test-Path $candidate) {
              $obsidianExe = $candidate
              $obsidianDir = $dir
              break
            }
          }
          # Broader search if not found in known locations
          if (-not $obsidianExe) {
            Write-Host "Not found in known paths, searching..."
            Write-Host "=== LOCALAPPDATA contents ==="
            Get-ChildItem $env:LOCALAPPDATA -Depth 2 -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*obsidian*" -or $_.Name -like "*Obsidian*" } | Select-Object FullName
            Write-Host "=== Program Files contents ==="
            Get-ChildItem $env:ProgramFiles -Depth 2 -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*obsidian*" -or $_.Name -like "*Obsidian*" } | Select-Object FullName
            Write-Host "=== Full drive search for Obsidian.exe ==="
            Get-ChildItem -Path C:\ -Filter "Obsidian.exe" -Recurse -ErrorAction SilentlyContinue -Depth 5 | Select-Object FullName
            Write-Host "=== Desktop shortcuts ==="
            Get-ChildItem "$env:USERPROFILE\Desktop" -ErrorAction SilentlyContinue | Select-Object FullName
            Write-Host "=== Start menu ==="
            Get-ChildItem "$env:APPDATA\Microsoft\Windows\Start Menu" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*obsidian*" -or $_.Name -like "*Obsidian*" } | Select-Object FullName
            Write-Error "Obsidian.exe not found after installation"
            exit 1
          }
          Write-Host "Obsidian installed at $obsidianDir"

          # Pre-seed obsidian.json to register the test vault and enable CLI
          $configDir = "$env:APPDATA\obsidian"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null
          $vaultName = Split-Path $env:OBSIDIAN_VAULT -Leaf
          $vaultPath = "$env:GITHUB_WORKSPACE/$env:OBSIDIAN_VAULT" -replace '\\','/'
          $config = @{
            vaults = @{
              $vaultName = @{
                path = $vaultPath
                ts = 0
                open = $true
              }
            }
            cli = $true
          } | ConvertTo-Json -Depth 3
          [System.IO.File]::WriteAllText("$configDir\obsidian.json", $config)
          Write-Host "Config written to $configDir\obsidian.json"
          Get-Content "$configDir\obsidian.json"

          # Add Obsidian's directory to PATH for subsequent steps.
          # Windows is case-insensitive, so `obsidian` resolves to `Obsidian.exe`.
          # We use GITHUB_PATH instead of a .cmd wrapper because Node.js
          # child_process.spawn doesn't resolve .cmd files without shell mode.
          echo $obsidianDir >> $env:GITHUB_PATH

          # Launch Obsidian in the background so CLI commands have an instance
          # to talk to via IPC
          Start-Process -FilePath $obsidianExe
          Start-Sleep -Seconds 10

          # Verify Obsidian is running
          $proc = Get-Process -Name "Obsidian" -ErrorAction SilentlyContinue
          if (-not $proc) {
            Write-Error "Obsidian failed to start — no process found"
            exit 1
          }
          Write-Host "Obsidian is running (PID: $($proc[0].Id))"

      - name: Debug Obsidian CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Write-Host "=== PATH check ==="
          Get-Command obsidian -ErrorAction SilentlyContinue | Select-Object Source
          Get-Command Obsidian -ErrorAction SilentlyContinue | Select-Object Source
          Write-Host "=== obsidian version ==="
          & obsidian version 2>&1
          Write-Host "=== exit code: $LASTEXITCODE ==="
          Write-Host "=== obsidian vault=obsidian-ts-test-vault files ==="
          & obsidian vault=obsidian-ts-test-vault files 2>&1
          Write-Host "=== exit code: $LASTEXITCODE ==="

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: pnpm run test

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: pnpm run test

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: pnpm run test
