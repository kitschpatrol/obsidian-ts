name: CI

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  OBSIDIAN_VERSION: '1.12.7'
  OBSIDIAN_VAULT: 'test/assets/obsidian-ts-test-vault'

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # Skip for now
      # - name: Lint
      #   run: pnpm run lint

      - name: Install Obsidian (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11 libgtk-3-0 libnss3 libasound2t64 libgbm1 libsecret-1-0
          wget -q "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.AppImage" -O /tmp/obsidian.AppImage
          chmod +x /tmp/obsidian.AppImage
          cd /tmp && /tmp/obsidian.AppImage --appimage-extract
          sudo mv /tmp/squashfs-root /opt/obsidian
          sudo chown root:root /opt/obsidian/chrome-sandbox
          sudo chmod 4755 /opt/obsidian/chrome-sandbox
          sudo ln -s /opt/obsidian/obsidian /usr/local/bin/obsidian
          mkdir -p ~/.config/obsidian
          jq -n --arg name "$(basename "${OBSIDIAN_VAULT}")" --arg path "${GITHUB_WORKSPACE}/${OBSIDIAN_VAULT}" \
            '{"vaults":{($name):{"path":$path,"ts":0,"open":true}},"cli":true}' \
            > ~/.config/obsidian/obsidian.json

      - name: Install Obsidian (macOS)
        if: runner.os == 'macOS'
        run: |
          wget -q "https://github.com/obsidianmd/obsidian-releases/releases/download/v${OBSIDIAN_VERSION}/Obsidian-${OBSIDIAN_VERSION}.dmg"
          sudo hdiutil attach "Obsidian-${OBSIDIAN_VERSION}.dmg"
          sudo cp -rf "/Volumes/Obsidian ${OBSIDIAN_VERSION}-universal/Obsidian.app" /Applications
          sudo hdiutil detach "/Volumes/Obsidian ${OBSIDIAN_VERSION}-universal"
          mkdir -p ~/Library/Application\ Support/obsidian
          jq -n --arg name "$(basename "${OBSIDIAN_VAULT}")" --arg path "${GITHUB_WORKSPACE}/${OBSIDIAN_VAULT}" \
            '{"vaults":{($name):{"path":$path,"ts":0,"open":true}},"cli":true}' \
            > ~/Library/Application\ Support/obsidian/obsidian.json

      - name: Install Obsidian (Windows)
        if: runner.os == 'Windows'
        run: echo "Obsidian CI install not yet supported on Windows. Skipping."

      - name: Verify Obsidian (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb -ac :99 -screen 0 1280x1024x16 &
          export DISPLAY=:99
          eval "$(dbus-launch --sh-syntax)"
          which obsidian
          obsidian --version
          cat ~/.config/obsidian/obsidian.json
          obsidian vault

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: |
          export DISPLAY=:99
          eval "$(dbus-launch --sh-syntax)"
          pnpm run test

      - name: Test (macOS)
        if: runner.os == 'macOS'
        run: pnpm run test

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: echo "Testing not yet supported on Windows. Skipping."
